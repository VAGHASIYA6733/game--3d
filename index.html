<html lang="en">
<head>

<title>Surat Street Market 3D — Multiplayer Vendor Battle</title>
<meta name="description" content="Compete as street food vendors in a 3D Surat market! Multiplayer, mobile-ready, 60fps browser game.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B35">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:'Outfit',sans-serif;touch-action:none}
canvas{display:block}
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s}
#loading h1{color:#FF6B35;font-size:2.5rem;font-weight:900;text-shadow:0 0 30px rgba(255,107,53,.5)}
#loading p{color:#e0e0e0;margin-top:10px;font-size:1.1rem}
.load-bar{width:200px;height:4px;background:#333;border-radius:4px;margin-top:20px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#FF6B35,#FFD166);border-radius:4px;transition:width .3s}
#ui{position:fixed;top:16px;left:16px;width:280px;background:rgba(20,20,40,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,107,53,.3);border-radius:16px;padding:18px;z-index:10;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#ui h2{font-size:1.15rem;font-weight:700;color:#FF6B35;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stats{display:flex;gap:16px;margin-bottom:12px;font-size:.9rem;color:#ccc}
.stats span{color:#FFD166;font-weight:600}
#pitchInput{width:100%;padding:10px 12px;border:1px solid rgba(255,107,53,.4);border-radius:10px;background:rgba(255,255,255,.07);color:#fff;font-family:'Outfit';font-size:.95rem;outline:none;margin-bottom:10px;transition:border-color .3s}
#pitchInput:focus{border-color:#FF6B35}
#battleBtn{width:100%;padding:12px;background:linear-gradient(135deg,#FF6B35,#e63946);border:none;border-radius:12px;color:#fff;font-family:'Outfit';font-weight:700;font-size:1.05rem;cursor:pointer;transition:transform .15s,box-shadow .3s;box-shadow:0 4px 15px rgba(255,107,53,.3)}
#battleBtn:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(255,107,53,.5)}
#battleBtn:disabled{opacity:.5;transform:none;cursor:not-allowed}
.results{margin-top:14px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px}
.results h3{font-size:.85rem;color:#FFD166;margin-bottom:8px}
.result-row{display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0;color:#bbb}
.result-row.winner{color:#4ade80;font-weight:600}
#timer{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,107,53,.3);border-radius:30px;padding:8px 24px;z-index:10;color:#FFD166;font-weight:700;font-size:1.1rem;display:none}
#countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;pointer-events:none}
#countdown span{font-size:8rem;font-weight:900;color:#FF6B35;text-shadow:0 0 60px rgba(255,107,53,.6);animation:countPulse .8s ease-out}
@keyframes countPulse{0%{transform:scale(2);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:0}}
#event-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.9);backdrop-filter:blur(12px);border:1px solid #FFD166;border-radius:14px;padding:10px 24px;z-index:10;color:#FFD166;font-weight:700;display:none;font-size:1rem}
#share-popup{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.9);border:1px solid #4ade80;border-radius:14px;padding:14px 28px;z-index:10;color:#fff;display:none;text-align:center;font-size:.95rem}
#share-popup button{margin-top:8px;padding:8px 18px;background:#4ade80;border:none;border-radius:8px;color:#1a1a2e;font-weight:700;cursor:pointer;font-family:'Outfit'}
#joystick{position:fixed;bottom:30px;left:30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,107,53,.3);display:none;z-index:10}
#joystick-knob{width:40px;height:40px;border-radius:50%;background:rgba(255,107,53,.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
@media(max-width:768px){
  #ui{width:220px;padding:12px;top:10px;left:10px;font-size:.85rem}
  #ui h2{font-size:1rem}
  #joystick{display:block}
}
@media(max-width:480px){
  #ui{width:180px;padding:10px}
}
</style>
</head>
<body>
<div id="loading"><h1>🏪 SURAT MARKET</h1><p>Setting up stalls...</p><div class="load-bar"><div class="load-fill" id="loadFill"></div></div></div>
<div id="ui">
  <h2 id="vendorTitle">🥟 VADA PAV BHAI 🥟</h2>
  <div class="stats"><div>Coins: <span id="coins">0₹</span></div><div>Wins: <span id="wins">0</span></div><div>Lv.<span id="level">1</span></div></div>
  <label style="font-size:.8rem;color:#999;margin-bottom:4px;display:block">Sales Pitch:</label>
  <input id="pitchInput" type="text" placeholder="Type your best pitch..." maxlength="80">
  <button id="battleBtn" onclick="startBattle()">⚔️ BATTLE!</button>
  <div class="results">
    <h3>🏆 LIVE RESULTS</h3>
    <div id="resultsList"></div>
  </div>
</div>
<div id="timer">⏱ 90s</div>
<div id="countdown"><span id="countNum">3</span></div>
<div id="event-banner" id="eventBanner"></div>
<div id="share-popup"><div id="shareText"></div><button onclick="copyShare()">📋 Copy & Share</button></div>
<div id="joystick"><div id="joystick-knob"></div></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

/* ═══════════════ GLOBALS ═══════════════ */
const STALLS=[
  {pos:[-8,.75,0],color:0xe63946,name:'🥟 VADA PAV BHAI',emoji:'🥟',item:'vada pav',price:12},
  {pos:[8,.75,0],color:0x2d6a4f,name:'🧉 CHAIWALA',emoji:'🧉',item:'chai',price:10},
  {pos:[0,.75,8],color:0x457b9d,name:'🥙 DHOKLA KING',emoji:'🥙',item:'dhokla',price:15},
  {pos:[0,.75,-8],color:0xe9c46a,name:'🥜 FARSAN WALA',emoji:'🥜',item:'farsan',price:8}
];
const CUSTOMER_COUNT=30, ROUND_TIME=90, PITCH_TIME=30;
let scene,camera,renderer,controls,clock;
let customers=[],stallMeshes=[],stallGlows=[];
let dustParticles,coinSystem;
let playerIdx=0,coins=0,wins=0,level=1,roundNum=0;
let gameState='lobby'; // lobby|countdown|pitch|rush|results
let roundTimer=0,pitchTimer=0;
let scores=[0,0,0,0],roundWinner=-1;
const roomId=new URLSearchParams(location.search).get('room')||'4721';
let audioCtx,sounds={};

/* ═══════════════ INIT ═══════════════ */
function init(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  scene.fog=new THREE.FogExp2(0x1a1a2e,.018);

  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
  camera.position.set(0,14,18);

  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;
  document.body.appendChild(renderer.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=.08;
  controls.maxPolarAngle=Math.PI/2.2;
  controls.minDistance=5;
  controls.maxDistance=35;
  controls.target.set(0,1,0);

  buildLights();
  buildGround();
  buildStalls();
  buildCustomers();
  buildDustParticles();
  buildCoinSystem();
  initAudio();
  initMultiplayer();

  window.addEventListener('resize',onResize);
  initMobileControls();

  // loading done
  let fill=document.getElementById('loadFill');
  fill.style.width='100%';
  setTimeout(()=>{document.getElementById('loading').style.opacity='0';setTimeout(()=>document.getElementById('loading').style.display='none',600)},800);

  animate();
}

/* ═══════════════ LIGHTS ═══════════════ */
function buildLights(){
  const amb=new THREE.AmbientLight(0xffd4a0,.4);
  scene.add(amb);
  const sun=new THREE.DirectionalLight(0xff8c42,1.2);
  sun.position.set(15,20,10);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.near=1;sun.shadow.camera.far=50;
  sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
  sun.shadow.camera.top=25;sun.shadow.camera.bottom=-25;
  scene.add(sun);
  // warm fill
  const fill=new THREE.DirectionalLight(0xff6b35,.3);
  fill.position.set(-10,8,-5);
  scene.add(fill);
  // sky hemisphere
  const hemi=new THREE.HemisphereLight(0xff8c42,0x1a1a2e,.3);
  scene.add(hemi);
}

/* ═══════════════ GROUND ═══════════════ */
function buildGround(){
  const canvas=document.createElement('canvas');
  canvas.width=512;canvas.height=512;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#3a3a4a';ctx.fillRect(0,0,512,512);
  // grid lines
  ctx.strokeStyle='#4a4a5a';ctx.lineWidth=1;
  for(let i=0;i<512;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke()}
  // yellow market lines
  ctx.strokeStyle='#e9c46a';ctx.lineWidth=3;ctx.setLineDash([20,10]);
  ctx.beginPath();ctx.arc(256,256,130,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);

  const tex=new THREE.CanvasTexture(canvas);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({map:tex,roughness:.85,metalness:.1})
  );
  ground.rotation.x=-Math.PI/2;
  ground.receiveShadow=true;
  scene.add(ground);
}

/* ═══════════════ HUMANOID ═══════════════ */
function createPerson(skinColor, shirtColor){
  const g=new THREE.Group();
  const matSkin=new THREE.MeshStandardMaterial({color:skinColor,roughness:.6});
  const matShirt=new THREE.MeshStandardMaterial({color:shirtColor,roughness:.7});
  const head=new THREE.Mesh(new THREE.BoxGeometry(.4,.4,.4),matSkin);
  head.position.y=1.5;head.castShadow=true;g.add(head);
  const body=new THREE.Mesh(new THREE.BoxGeometry(.6,.8,.3),matShirt);
  body.position.y=.9;body.castShadow=true;g.add(body);
  const armL=new THREE.Mesh(new THREE.BoxGeometry(.2,.7,.2),matSkin);
  armL.position.set(-.4,.9,0);armL.castShadow=true;g.add(armL);
  const armR=new THREE.Mesh(new THREE.BoxGeometry(.2,.7,.2),matSkin);
  armR.position.set(.4,.9,0);armR.castShadow=true;g.add(armR);
  return g;
}

/* ═══════════════ STALLS ═══════════════ */
function buildStalls(){
  STALLS.forEach((s,i)=>{
    const g=new THREE.Group();
    // base counter
    const base=new THREE.Mesh(new THREE.BoxGeometry(3,.8,2),new THREE.MeshStandardMaterial({color:s.color,roughness:.6}));
    base.castShadow=true;base.receiveShadow=true;
    g.add(base);
    // canopy
    const canopy=new THREE.Mesh(new THREE.BoxGeometry(3.4,.1,2.4),new THREE.MeshStandardMaterial({color:new THREE.Color(s.color).multiplyScalar(.7),roughness:.5}));
    canopy.position.y=2.2;canopy.castShadow=true;
    g.add(canopy);
    // poles
    for(let px of[-1.4,1.4]){for(let pz of[-.9,.9]){
      const pole=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,2.2),new THREE.MeshStandardMaterial({color:0x888888,metalness:.6}));
      pole.position.set(px,1.1,pz);g.add(pole);
    }}
    // neon sign
    const signGeo=new THREE.PlaneGeometry(2.6,.5);
    const signCanvas=document.createElement('canvas');
    signCanvas.width=256;signCanvas.height=48;
    const sctx=signCanvas.getContext('2d');
    sctx.fillStyle='rgba(0,0,0,.7)';sctx.fillRect(0,0,256,48);
    sctx.fillStyle='#fff';sctx.font='bold 24px Outfit,sans-serif';sctx.textAlign='center';
    sctx.fillText(s.name,128,32);
    const signTex=new THREE.CanvasTexture(signCanvas);
    const sign=new THREE.Mesh(signGeo,new THREE.MeshBasicMaterial({map:signTex,transparent:true}));
    sign.position.set(0,2.6,1.01);g.add(sign);
    // stall light
    const light=new THREE.PointLight(s.color,.8,8);
    light.position.set(0,2.5,0);g.add(light);
    // glow mesh (hidden initially)
    const glowMat=new THREE.MeshBasicMaterial({color:s.color,transparent:true,opacity:0});
    const glow=new THREE.Mesh(new THREE.BoxGeometry(3.6,3,2.6),glowMat);
    glow.position.y=1;g.add(glow);
    stallGlows.push(glowMat);

    // Vendor Character
    const vendor=createPerson(0x8d5524,s.color);
    vendor.position.set(0,.8,-.4);
    g.add(vendor);

    g.position.set(...s.pos);
    scene.add(g);
    stallMeshes.push(g);
  });
}

/* ═══════════════ CUSTOMERS ═══════════════ */
function buildCustomers(){
  const shirtColors=[0xff8c42,0x2d6a4f,0x457b9d,0xe9c46a,0xe63946,0x8338ec,0xff006e];
  const skinColors=[0x8d5524,0xc68642,0xe0ac69,0xf1c27d,0xffdbac];
  for(let i=0;i<CUSTOMER_COUNT;i++){
    const shirt=shirtColors[Math.floor(Math.random()*shirtColors.length)];
    const skin=skinColors[Math.floor(Math.random()*skinColors.length)];
    const mesh=createPerson(skin,shirt);
    const angle=Math.random()*Math.PI*2;
    const r=3+Math.random()*15;
    mesh.position.set(Math.cos(angle)*r,0,Math.sin(angle)*r);
    scene.add(mesh);
    customers.push({
      mesh,
      target:new THREE.Vector3((Math.random()-.5)*20,0,(Math.random()-.5)*20),
      speed:.5+Math.random()*1.5,
      bobPhase:Math.random()*Math.PI*2,
      rushing:false,rushTarget:-1
    });
  }
}

/* ═══════════════ DUST PARTICLES ═══════════════ */
function buildDustParticles(){
  const count=200;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){pos[i*3]=(Math.random()-.5)*50;pos[i*3+1]=Math.random()*5;pos[i*3+2]=(Math.random()-.5)*50}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  dustParticles=new THREE.Points(geo,new THREE.PointsMaterial({color:0xffd4a0,size:.06,transparent:true,opacity:.4}));
  scene.add(dustParticles);
}

/* ═══════════════ COIN PARTICLES ═══════════════ */
function buildCoinSystem(){
  const count=80;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const vel=new Float32Array(count*3);
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  coinSystem={geo,mesh:new THREE.Points(geo,new THREE.PointsMaterial({color:0xFFD700,size:.15,transparent:true,opacity:0})),velocities:vel,active:false,life:0};
  scene.add(coinSystem.mesh);
}

function triggerCoins(pos){
  const p=coinSystem.geo.attributes.position.array;
  for(let i=0;i<80;i++){
    p[i*3]=pos.x;p[i*3+1]=pos.y+1;p[i*3+2]=pos.z;
    coinSystem.velocities[i*3]=(Math.random()-.5)*8;
    coinSystem.velocities[i*3+1]=3+Math.random()*5;
    coinSystem.velocities[i*3+2]=(Math.random()-.5)*8;
  }
  coinSystem.geo.attributes.position.needsUpdate=true;
  coinSystem.mesh.material.opacity=1;
  coinSystem.active=true;coinSystem.life=2;
}

/* ═══════════════ AUDIO ═══════════════ */
function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  document.addEventListener('click',()=>{if(audioCtx.state==='suspended')audioCtx.resume()},{once:true});
}
function speakText(text, pitch=1){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.pitch=pitch;
  u.rate=1.1;
  speechSynthesis.speak(u);
}
function playSound(type, text=''){
  if(text) speakText(text, 1 + (Math.random()-.5)*.2);
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const g=audioCtx.createGain();g.connect(audioCtx.destination);
  if(type==='coin'){
    g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
    const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1200+Math.random()*400,now);
    o.connect(g);o.start(now);o.stop(now+.3);
  }else if(type==='fanfare'){
    [523,659,784].forEach((f,i)=>{
      const o=audioCtx.createOscillator();o.type='square';
      o.frequency.setValueAtTime(f,now+i*.15);
      const fg=audioCtx.createGain();fg.gain.setValueAtTime(.08,now+i*.15);fg.gain.exponentialRampToValueAtTime(.001,now+i*.15+.6);
      o.connect(fg);fg.connect(audioCtx.destination);o.start(now+i*.15);o.stop(now+i*.15+.6);
    });
  }else if(type==='step'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.05,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-.5)*.3;
    const src=audioCtx.createBufferSource();src.buffer=buf;
    g.gain.setValueAtTime(.04,now);g.gain.exponentialRampToValueAtTime(.001,now+.05);
    src.connect(g);src.start(now);
  }
}

/* ═══════════════ MULTIPLAYER (BroadcastChannel) ═══════════════ */
let bc;
function initMultiplayer(){
  try{bc=new BroadcastChannel('surat_market_'+roomId)}catch(e){}
  if(bc)bc.onmessage=e=>{
    const d=e.data;
    if(d.type==='pitch'&&d.player!==playerIdx){/* store AI pitches */}
  };
  document.title=`Surat Market — Room ${roomId}`;
}

/* ═══════════════ GAME LOGIC ═══════════════ */
window.startBattle=function(){
  if(gameState!=='lobby')return;
  gameState='countdown';
  roundNum++;
  document.getElementById('battleBtn').disabled=true;
  doCountdown(3);
};

function doCountdown(n){
  if(n<=0){startPitchPhase();return}
  const el=document.getElementById('countdown');
  el.style.display='flex';
  document.getElementById('countNum').textContent=n;
  // re-trigger animation
  const s=document.getElementById('countNum');
  s.style.animation='none';void s.offsetWidth;s.style.animation='countPulse .8s ease-out';
  setTimeout(()=>doCountdown(n-1),1000);
}

function startPitchPhase(){
  document.getElementById('countdown').style.display='none';
  gameState='pitch';
  pitchTimer=PITCH_TIME;
  document.getElementById('timer').style.display='block';
  document.getElementById('timer').textContent=`✍️ Pitch! ${PITCH_TIME}s`;
  document.getElementById('pitchInput').focus();
  playSound('','Type your pitch now!');
}

function endPitchPhase(){
  gameState='rush';
  // score pitches
  const playerPitch=document.getElementById('pitchInput').value.toLowerCase();
  if(playerPitch) playSound('', playerPitch);
  scores=[0,0,0,0];
  // player score based on pitch length + keywords
  const keywords=['best','fresh','hot','spicy','authentic','delicious','tasty','amazing','cheap','special','homemade','love'];
  let pScore=playerPitch.length*.5;
  keywords.forEach(k=>{if(playerPitch.includes(k))pScore+=15});
  pScore+=Math.random()*20;
  scores[0]=Math.round(pScore);
  // AI scores
  for(let i=1;i<4;i++)scores[i]=Math.round(20+Math.random()*50);

  // Apply event modifiers
  if(currentEvent==='monsoon'&&scores[1])scores[1]*=2;
  if(currentEvent==='navratri'&&scores[3])scores[3]*=3;
  if(currentEvent==='uncle')scores=scores.map(s=>Math.round(s*.75));

  roundWinner=scores.indexOf(Math.max(...scores));
  // customer rush toward winner
  customers.forEach(c=>{c.rushing=true;c.rushTarget=roundWinner;c.speed=4});
  document.getElementById('timer').textContent='🏃 CUSTOMER RUSH!';
  playSound('step');
  setTimeout(showResults,4000);
}

function showResults(){
  gameState='results';
  const earnedCoins=scores[playerIdx]*STALLS[playerIdx].price;
  coins+=earnedCoins;
  if(roundWinner===playerIdx)wins++;
  level=1+Math.floor(wins/3);

  // update UI
  document.getElementById('coins').textContent=coins+'₹';
  document.getElementById('wins').textContent=wins;
  document.getElementById('level').textContent=level;

  // glow winner stall
  stallGlows[roundWinner].opacity=.6;
  triggerCoins(new THREE.Vector3(...STALLS[roundWinner].pos));
  const winnerName=STALLS[roundWinner].name.replace(/[^\w\s]/gi, '');
  playSound('fanfare', `${winnerName} wins!`);
  for(let i=0;i<10;i++)setTimeout(()=>playSound('coin'),i*100);

  // results list
  let html='';
  STALLS.forEach((s,i)=>{
    const cups=scores[i];
    const earn=cups*s.price;
    html+=`<div class="result-row ${i===roundWinner?'winner':''}">${s.emoji} ${i===playerIdx?'You':s.name.split(' ')[1]}: ${cups} = ₹${earn} ${i===roundWinner?'👑':''}</div>`;
  });
  document.getElementById('resultsList').innerHTML=html;
  document.getElementById('timer').textContent=`🏆 ${STALLS[roundWinner].name} WINS!`;

  // share popup
  if(roundWinner===playerIdx){
    document.getElementById('shareText').textContent=`I won ₹${earnedCoins} in Surat Market! Room ${roomId}`;
    document.getElementById('share-popup').style.display='block';
  }

  // check for event next round
  if(roundNum%3===0)pickEvent();

  setTimeout(resetRound,5000);
}

let currentEvent=null;
const EVENTS=['monsoon','cow_jam','navratri','uncle'];
function pickEvent(){
  currentEvent=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  const bannerEl=document.getElementById('event-banner');
  const labels={monsoon:'☔ MONSOON! Chai 2x bonus!',cow_jam:'🐄 COW JAM! Random stall blocked!',navratri:'🎉 NAVRATRI! Farsan 3x sales!',uncle:'👴 UNCLE Ji! All prices -25%!'};
  const speeches={monsoon:'Monsoon offer!',cow_jam:'Oh no, a cow!',navratri:'Navratri special!',uncle:'Uncle is haggling!'};
  bannerEl.textContent=labels[currentEvent];
  playSound('', speeches[currentEvent]);
  bannerEl.style.display='block';
  setTimeout(()=>bannerEl.style.display='none',6000);
  // cow jam effect
  if(currentEvent==='cow_jam'){
    const blocked=Math.floor(Math.random()*4);
    stallMeshes[blocked].visible=false;
    setTimeout(()=>stallMeshes[blocked].visible=true,10000);
  }
}

function resetRound(){
  gameState='lobby';
  document.getElementById('battleBtn').disabled=false;
  document.getElementById('pitchInput').value='';
  document.getElementById('timer').style.display='none';
  document.getElementById('share-popup').style.display='none';
  stallGlows.forEach(g=>g.opacity=0);
  coinSystem.mesh.material.opacity=0;coinSystem.active=false;
  customers.forEach(c=>{c.rushing=false;c.speed=.5+Math.random()*1.5;c.target.set((Math.random()-.5)*20,0,(Math.random()-.5)*20)});
  roundWinner=-1;currentEvent=null;
}

window.copyShare=function(){
  navigator.clipboard.writeText(`Join my Surat Market game! Room ${roomId} 🏪`).then(()=>{
    document.querySelector('#share-popup button').textContent='✅ Copied!';
  });
};

/* ═══════════════ MOBILE ═══════════════ */
function initMobileControls(){
  const joy=document.getElementById('joystick');
  const knob=document.getElementById('joystick-knob');
  let joyActive=false,joyStart={x:0,y:0};
  joy.addEventListener('touchstart',e=>{joyActive=true;const t=e.touches[0];joyStart={x:t.clientX,y:t.clientY}});
  joy.addEventListener('touchmove',e=>{
    if(!joyActive)return;e.preventDefault();
    const t=e.touches[0];
    let dx=t.clientX-joyStart.x,dy=t.clientY-joyStart.y;
    const max=30;const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>max){dx=dx/dist*max;dy=dy/dist*max}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    controls.target.x-=dx*.005;controls.target.z-=dy*.005;
  },{passive:false});
  joy.addEventListener('touchend',()=>{joyActive=false;knob.style.transform='translate(-50%,-50%)'});
}

/* ═══════════════ ANIMATION LOOP ═══════════════ */
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const t=clock.getElapsedTime();

  // pitch timer
  if(gameState==='pitch'){
    pitchTimer-=dt;
    document.getElementById('timer').textContent=`✍️ Pitch! ${Math.ceil(pitchTimer)}s`;
    if(pitchTimer<=0)endPitchPhase();
  }

  // update customers
  customers.forEach((c,i)=>{
    // bobbing
    c.mesh.position.y=Math.sin(t*3+c.bobPhase)*.08;
    // scale pulse during rush
    if(c.rushing){
      const pulse=1+Math.sin(t*8)*.15;
      c.mesh.scale.setScalar(pulse);
    }else{c.mesh.scale.setScalar(1)}

    // movement
    let target=c.target;
    if(c.rushing&&c.rushTarget>=0){
      const sp=STALLS[c.rushTarget].pos;
      target=new THREE.Vector3(sp[0]+(Math.random()-.5)*2,0,sp[2]+(Math.random()-.5)*2);
    }
    const dir=new THREE.Vector3().subVectors(target,c.mesh.position);
    dir.y=0;
    if(dir.length()>.5){
      dir.normalize().multiplyScalar(c.speed*dt);
      c.mesh.position.add(dir);
    }else if(!c.rushing){
      c.target.set((Math.random()-.5)*20,0,(Math.random()-.5)*20);
      if(Math.random()<.05)playSound('step');
    }
  });

  // dust particles drift
  if(dustParticles){
    const dp=dustParticles.geometry.attributes.position.array;
    for(let i=0;i<dp.length;i+=3){
      dp[i]+=Math.sin(t+i)*.003;
      dp[i+1]+=.002;
      if(dp[i+1]>5)dp[i+1]=0;
    }
    dustParticles.geometry.attributes.position.needsUpdate=true;
  }

  // coin particles
  if(coinSystem.active){
    coinSystem.life-=dt;
    const p=coinSystem.geo.attributes.position.array;
    for(let i=0;i<80;i++){
      p[i*3]+=coinSystem.velocities[i*3]*dt;
      p[i*3+1]+=coinSystem.velocities[i*3+1]*dt;
      p[i*3+2]+=coinSystem.velocities[i*3+2]*dt;
      coinSystem.velocities[i*3+1]-=9.8*dt; // gravity
    }
    coinSystem.geo.attributes.position.needsUpdate=true;
    coinSystem.mesh.material.opacity=Math.max(0,coinSystem.life/2);
    if(coinSystem.life<=0){coinSystem.active=false;coinSystem.mesh.material.opacity=0}
  }

  // stall glow fade
  stallGlows.forEach(g=>{if(g.opacity>0){g.opacity=Math.max(0,g.opacity-.003);const pulse=Math.sin(t*6)*.1;g.opacity=Math.max(0,g.opacity+pulse)}});

  controls.update();
  renderer.render(scene,camera);
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

// keyboard controls
document.addEventListener('keydown',e=>{
  const sp=.5;
  if(e.key==='w')controls.target.z-=sp;
  if(e.key==='s')controls.target.z+=sp;
  if(e.key==='a')controls.target.x-=sp;
  if(e.key==='d')controls.target.x+=sp;
});

init();
</script>
